plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keyPropertiesFile = rootProject.file('key.properties')
def keyProperties = new Properties()
if (keyPropertiesFile.exists()) {
    keyPropertiesFile.withReader('UTF-8') { reader -> keyProperties.load(reader) }
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterCompileSdk = localProperties.getProperty('flutter.compileSdkVersion') ?: 34
def flutterMinSdk = localProperties.getProperty('flutter.minSdkVersion') ?: 21
def flutterTargetSdk = localProperties.getProperty('flutter.targetSdkVersion') ?: 34
def flutterNdkVersion = localProperties.getProperty('flutter.ndkVersion') ?: '26.1.10909125'

android {
    namespace = "com.ubuncare.ubuncare_app"
    compileSdk = 36                // ✅ updated
    ndkVersion = flutterNdkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId = "com.ubuncare.ubuncare_app"
        minSdkVersion = flutter.minSdkVersion                // ✅ updated
        targetSdk = 36             // ✅ updated
        versionCode = 1
        versionName = "1.0.0"
    }

    signingConfigs {
        release {
            if (keyPropertiesFile.exists()) {
                storeFile     file(keyProperties['storeFile'])
                storePassword keyProperties['storePassword']
                keyAlias      keyProperties['keyAlias']
                keyPassword   keyProperties['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}
